<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recouvrement — Matera</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css">
<style>
:root{
  --brand:#4E49FC;--bl:#F5F5FF;--bm:#8784FD;
  --tx:#26262C;--sub:#656576;--dis:#A2A1AF;
  --err:#CA1E12;--suc:#13762C;--warn:#955804;--info:#206E92;
  --bo:#E8E8EC;--fo:#8784FD;
  --bg:#fff;--bgn:#F7F7F8;--bgp:#F5F5FF;
  --bge:#FFF5F5;--bgs:#EFFBF2;--bgw:#FFF7EB;--bgi:#F2F9FD;
  --f:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--f);font-size:14px;color:var(--tx);background:var(--bgn);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.tnav{height:50px;background:var(--bg);border-bottom:1px solid var(--bo);display:flex;align-items:center;padding:0 18px;gap:0;flex-shrink:0;z-index:10}
.logo{display:flex;align-items:center;gap:8px;margin-right:20px}
.lmark{width:26px;height:26px;background:var(--brand);border-radius:6px;display:flex;align-items:center;justify-content:center}
.lmark svg{width:13px;height:13px;fill:white}
.tabs{display:flex;height:100%}
.tab{display:flex;align-items:center;gap:5px;padding:0 13px;font-size:12px;font-weight:500;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--brand);border-bottom-color:var(--brand)}
.tab .mdi{font-size:14px}
.tright{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn{padding:5px 11px;border-radius:8px;border:1px solid var(--bo);background:var(--bg);color:var(--tx);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.btn:hover{background:var(--bgn)}
.bp{background:var(--brand);border-color:var(--brand);color:#fff}
.bp:hover{background:#3d38e8!important}
.bsm{padding:4px 9px;font-size:11px}
.bgh{border-color:transparent;background:transparent}
.bgh:hover{background:var(--bgn)}
.bde{color:var(--err);border-color:var(--err)}
.bde:hover{background:var(--bge)}
.av{width:26px;height:26px;border-radius:50%;background:var(--brand);color:white;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.ksearch{display:flex;align-items:center;gap:5px;background:var(--bgn);border:1px solid var(--bo);border-radius:8px;padding:5px 9px;width:180px}
.ksearch input{border:none;background:transparent;outline:none;font-size:12px;color:var(--tx);width:100%}
.page{flex:1;overflow:hidden;display:none;flex-direction:column}
.page.on{display:flex}
.kbar{padding:9px 18px;background:var(--bg);border-bottom:1px solid var(--bo);display:flex;align-items:center;gap:9px;flex-shrink:0;flex-wrap:wrap}
.kstats{display:flex;gap:14px;margin-left:auto}
.kst{font-size:11px;color:var(--sub);display:flex;align-items:center;gap:4px}
.kst strong{color:var(--tx);font-weight:600}
.board{flex:1;overflow-x:auto;overflow-y:hidden;display:flex;padding:14px 16px;gap:10px;align-items:flex-start}
.col{width:225px;flex-shrink:0;display:flex;flex-direction:column;max-height:100%}
.col-hd{display:flex;align-items:center;gap:7px;padding:0 2px 9px}
.cdot{width:7px;height:7px;border-radius:50%}
.ctitle{font-size:11px;font-weight:700;color:var(--tx)}
.ccnt{font-size:10px;color:var(--sub);background:var(--bgn);border:1px solid var(--bo);border-radius:10px;padding:0 6px;line-height:1.9;font-weight:600}
.col-body{min-height:40px;display:flex;flex-direction:column;gap:7px;flex:1;overflow-y:auto;padding:1px 2px 14px;border-radius:8px;transition:background .15s,border .15s}
.col-body.dov{background:var(--bgp);border:2px dashed var(--bm);padding:8px}
.kc{background:var(--bg);border:1px solid var(--bo);border-radius:12px;padding:11px 12px;cursor:grab;transition:box-shadow .15s,transform .1s;user-select:none;position:relative}
.kc:hover{box-shadow:0 2px 10px rgba(0,0,0,.09)}
.kc.dragging{opacity:.4;transform:rotate(2deg);cursor:grabbing}
.kc.overdue{border-left:3px solid var(--err)}
.kc-copro{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.kc-deb{font-size:11px;color:var(--sub);margin-bottom:7px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kc-row{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.kc-dette{font-size:11px;font-weight:600}
.kc-age{font-size:10px;color:var(--dis);margin-left:auto;display:flex;align-items:center;gap:2px}
.kc-jur{width:18px;height:18px;border-radius:50%;background:var(--brand);color:white;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tag{display:inline-flex;align-items:center;gap:2px;padding:1px 5px;border-radius:4px;font-size:10px;font-weight:600}
.tag-od{background:var(--bge);color:var(--err)}
.tag-em{background:var(--bgs);color:var(--suc)}
.tag-f{background:var(--bgi);color:var(--info);cursor:pointer}
.pbadge{position:absolute;top:-4px;right:-4px;width:14px;height:14px;background:var(--warn);border-radius:50%;border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:white}
.etb{background:var(--bgw);border:1px solid #f0c97a;border-radius:8px;padding:9px 12px;display:flex;align-items:flex-start;gap:8px;font-size:12px}
.etb .mdi{flex-shrink:0;margin-top:1px;color:var(--warn);font-size:15px}
.etb-t{font-weight:600;color:var(--warn);margin-bottom:2px}
.etb-acts{display:flex;gap:5px;margin-top:6px}
.slide{position:fixed;right:-440px;top:50px;bottom:0;width:440px;background:var(--bg);border-left:1px solid var(--bo);display:flex;flex-direction:column;transition:right .2s;z-index:40;box-shadow:-4px 0 20px rgba(0,0,0,.07)}
.slide.open{right:0}
.sl-top{padding:12px 14px;border-bottom:1px solid var(--bo);display:flex;align-items:flex-start;gap:9px;flex-shrink:0}
.sl-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px}
.slsec{background:var(--bgn);border-radius:12px;padding:11px}
.slst{font-size:10px;font-weight:700;color:var(--dis);text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.ir{display:flex;justify-content:space-between;align-items:flex-start;padding:2px 0;font-size:12px}
.il{color:var(--sub)}
.iv{font-weight:500;text-align:right;max-width:60%;font-size:12px;overflow:hidden;text-overflow:ellipsis}
.pb{height:3px;background:var(--bo);border-radius:2px;overflow:hidden;margin-top:4px}
.pf{height:100%;background:var(--brand);transition:width .4s}
.tli{display:flex;gap:8px}
.tll{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.tld{width:7px;height:7px;border-radius:50%;border:2px solid var(--brand);background:var(--bg)}
.tld.dn{background:var(--brand)}
.tld.pd{border-color:var(--bo)}
.tlc{width:2px;flex:1;background:var(--bo);min-height:7px}
.tlco{flex:1;padding-bottom:6px}
.tlda{font-size:10px;color:var(--dis);margin-bottom:1px}
.tltx{font-size:12px;line-height:1.4}
.ji{display:flex;gap:7px;padding:5px 0;border-bottom:1px solid var(--bo);font-size:11px}
.ji:last-child{border-bottom:none}
.jd{color:var(--dis);flex-shrink:0;width:72px}
.etag{display:inline-flex;align-items:center;gap:2px;font-size:10px;color:var(--info);background:var(--bgi);padding:1px 5px;border-radius:10px;font-weight:600;margin-left:3px}
.saf{padding:10px 12px;border-top:1px solid var(--bo);display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.saft{font-size:10px;font-weight:700;color:var(--dis);text-transform:uppercase;letter-spacing:.7px}
.ag{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.ac{padding:7px 9px;border:1px solid var(--bo);border-radius:8px;background:var(--bg);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;font-size:12px;font-weight:500}
.ac:hover{border-color:var(--bm);background:var(--bgp);color:var(--brand)}
.ac.full{grid-column:1/-1}
.ac.note{background:var(--bgp);border-color:var(--bm);color:var(--brand)}
.ac.note:hover{background:var(--brand);color:white}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--bg);border-radius:16px;width:600px;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.18)}
.mh{padding:16px 20px 12px;border-bottom:1px solid var(--bo);display:flex;align-items:flex-start;justify-content:space-between}
.mt{font-size:16px;font-weight:700}
.ms{font-size:12px;color:var(--sub);margin-top:2px}
.mc{border:none;background:none;cursor:pointer;color:var(--sub);font-size:20px;line-height:1}
.mb{padding:16px 20px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:11px}
.mf{padding:10px 20px;border-top:1px solid var(--bo);display:flex;align-items:center;justify-content:flex-end;gap:7px}
.sp{flex:1}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:12px;font-weight:500}
.fh{font-size:11px;color:var(--sub)}
.fi{padding:7px 10px;border:1px solid var(--bo);border-radius:8px;font-size:13px;color:var(--tx);background:var(--bg);outline:none;transition:border .15s;font-family:var(--f);width:100%}
.fi:focus{border-color:var(--fo)}
.fsel{appearance:none;padding:7px 10px;border:1px solid var(--bo);border-radius:8px;font-size:13px;color:var(--tx);background:var(--bg);outline:none;cursor:pointer;width:100%}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ep{background:var(--bgn);border:1px solid var(--bo);border-radius:8px;overflow:hidden}
.eph{padding:8px 12px;background:var(--bg);border-bottom:1px solid var(--bo)}
.eps{font-weight:600;font-size:12px;margin-top:1px}
.epb{padding:11px 12px;font-size:12px;line-height:1.65;white-space:pre-wrap;max-height:200px;overflow-y:auto}
.al{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;border-radius:8px;font-size:12px;line-height:1.5}
.ali{background:var(--bgi);color:var(--info)}
.als{background:var(--bgs);color:var(--suc)}
.alw{background:var(--bgw);color:var(--warn)}
.al .mdi{font-size:14px;flex-shrink:0;margin-top:1px}
.np{background:var(--bgp);border:1px solid var(--bm);border-radius:8px;padding:12px;font-size:12px;line-height:1.7;white-space:pre-wrap;max-height:260px;overflow-y:auto}
.mbtn{display:flex;align-items:center;gap:6px;padding:6px 13px;background:var(--brand);color:white;border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;transition:background .15s;border:none;cursor:pointer}
.mbtn:hover{background:#3d38e8}
.cc{font-size:11px;color:var(--suc);display:none;align-items:center;gap:3px}
.cc.show{display:flex}
.peda{background:#fafafa;border:1px solid var(--bo);border-radius:12px;overflow:hidden}
.peda-hd{background:var(--brand);color:white;padding:12px 16px;display:flex;align-items:center;gap:8px}
.peda-hd .mdi{font-size:18px}
.peda-htx .title{font-size:13px;font-weight:700}
.peda-htx .sub{font-size:11px;opacity:.8;margin-top:1px}
.peda-body{padding:14px 16px;display:flex;flex-direction:column;gap:9px}
.peda-step{display:flex;gap:10px;align-items:flex-start}
.peda-num{width:22px;height:22px;border-radius:50%;background:var(--brand);color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.peda-txt{flex:1;font-size:12px;line-height:1.5}
.peda-txt strong{font-weight:600;color:var(--tx)}
.peda-txt em{font-style:normal;color:var(--sub)}
.peda-div{height:1px;background:var(--bo)}
.peda-note{display:flex;gap:8px;align-items:flex-start;padding:9px 12px;background:var(--bgs);border-radius:8px;font-size:12px;color:var(--suc)}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600}
.bs{background:var(--bgs);color:var(--suc)}
.bw{background:var(--bgw);color:var(--warn)}
.be{background:var(--bge);color:var(--err)}
.bi{background:var(--bgi);color:var(--info)}
.ssec{background:var(--bg);border:1px solid var(--bo);border-radius:16px;padding:18px 20px;margin-bottom:14px}
.ssec-t{font-size:14px;font-weight:700;margin-bottom:3px}
.ssec-s{font-size:12px;color:var(--sub);margin-bottom:14px}
.sdiv{height:1px;background:var(--bo);margin:12px 0}
.tm-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bo)}
.tm-row:last-child{border-bottom:none}
.tm-av{width:28px;height:28px;border-radius:50%;background:var(--brand);color:white;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cab-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bo)}
.cab-row:last-child{border-bottom:none}
.toast{position:fixed;bottom:20px;right:20px;background:var(--tx);color:white;padding:10px 14px;border-radius:8px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:7px;z-index:300;transform:translateY(60px);opacity:0;transition:all .2s;box-shadow:0 4px 20px rgba(0,0,0,.2);max-width:360px}
.toast.show{transform:translateY(0);opacity:1}
.toast .mdi{color:#6ee7b7;font-size:14px;flex-shrink:0}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bo);border-radius:2px}
</style>
</head>
<body>
<nav class="tnav">
  <div class="logo">
    <div class="lmark"><svg viewBox="0 0 24 24"><path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.5L20 8.5v7L12 19.5 4 15.5v-7L12 4.5z"/></svg></div>
    <span style="font-size:13px;font-weight:700" id="team-name">Matera</span>
    <span style="font-size:11px;color:var(--sub);margin-left:2px" id="team-sub">· Recouvrement</span>
  </div>
  <div class="tabs">
    <div class="tab on" onclick="goTab('kanban',this)"><span class="mdi mdi-view-column-outline"></span> Kanban</div>
    <div class="tab" onclick="goTab('list',this)"><span class="mdi mdi-format-list-bulleted"></span> Liste</div>
    <div class="tab" onclick="goTab('dashboard',this)"><span class="mdi mdi-chart-bar"></span> Dashboard</div>
    <div class="tab" onclick="goTab('settings',this)"><span class="mdi mdi-cog-outline"></span> Paramètres</div>
  </div>
  <div class="tright">
    <div class="ksearch"><span class="mdi mdi-magnify" style="color:var(--dis);font-size:14px"></span><input placeholder="Rechercher…" oninput="doSearch(this.value)"></div>
    <button class="btn bp" onclick="openNewDossier()"><span class="mdi mdi-plus"></span> Nouveau dossier</button>
    <div class="av" id="cur-av" title="">SC</div>
  </div>
</nav>

<div class="page on" id="page-kanban">
  <div class="kbar">
    <select id="jur-filter" style="padding:4px 8px;border:1px solid var(--bo);border-radius:6px;font-size:11px;background:var(--bg);cursor:pointer" onchange="renderBoard()">
      <option value="">Tous les juristes</option>
    </select>
    <div id="etb-zone" style="flex:1"></div>
    <div class="kstats">
      <div class="kst"><span class="mdi mdi-briefcase-outline" style="font-size:13px"></span><strong id="s-tot">0</strong> dossiers</div>
      <div class="kst"><span class="mdi mdi-lightning-bolt" style="font-size:13px;color:var(--err)"></span><strong id="s-urg" style="color:var(--err)">0</strong> urgents</div>
      <div class="kst"><span class="mdi mdi-clock-alert-outline" style="font-size:13px;color:var(--warn)"></span><strong id="s-stl" style="color:var(--warn)">0</strong> sans action</div>
    </div>
  </div>
  <div class="board" id="board"></div>
</div>

<div class="page" id="page-list"><div style="padding:18px;overflow-y:auto;flex:1"><div style="background:var(--bg);border:1px solid var(--bo);border-radius:12px;overflow:hidden" id="list-view"></div></div></div>
<div class="page" id="page-dashboard"><div style="padding:18px;overflow-y:auto;flex:1" id="dash-view"></div></div>
<div class="page" id="page-settings"><div style="padding:22px;overflow-y:auto;max-width:760px;margin:0 auto;width:100%;flex:1" id="sview"></div></div>

<div class="slide" id="slide">
  <div class="sl-top">
    <div style="flex:1"><div style="font-size:14px;font-weight:700" id="sl-title">—</div><div style="font-size:11px;color:var(--sub);margin-top:2px" id="sl-sub">—</div></div>
    <button class="btn bgh" style="padding:3px 6px" onclick="closeSlide()"><span class="mdi mdi-close"></span></button>
  </div>
  <div class="sl-body" id="sl-body"></div>
  <div class="saf" id="sl-acts"></div>
</div>

<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
